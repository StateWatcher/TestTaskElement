server {
    listen 80;
    server_name _;

    # Фид весит десятки мегабайт: multipart в REST и ~+33% в base64 у JSON-RPC.
    # Дефолтного 1m не хватило бы обоим транспортам.
    client_max_body_size 64m;

    # Прокси на бэкенд делает фронт и API одним origin: CORS не нужен,
    # а HttpOnly-cookie сессии ходит без исключений для third-party.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # разбор фида на 3685 лотов занимает десятки секунд
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA: любой маршрут отдаёт index.html, роутинг разруливает vue-router
        try_files $uri $uri/ /index.html;
    }
}
